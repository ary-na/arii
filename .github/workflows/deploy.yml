name: Deploy to S3

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      # HTML, JSON, XML, TXT — never cache (upload first)
      - name: Sync HTML and config files to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.xml" \
            --include "*.txt" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --metadata-directive REPLACE

      # Hashed assets (JS, CSS, fonts, images) — cache 1 year
      # --delete runs here last so nothing gets wrongly removed
      - name: Sync hashed assets to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --cache-control "public,max-age=31536000,immutable" \
            --metadata-directive REPLACE \
            --delete

      # Invalidate CloudFront so HTML changes go live immediately
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
